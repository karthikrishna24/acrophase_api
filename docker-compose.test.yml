version: "3.8"

services:
  test_db:
    image: postgres:15
    container_name: acrophase_test_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: acrophase_test
    ports:
      - "5434:5432"
    volumes:
      - test_postgres_data:/var/lib/postgresql/data

  test_app:
    build: .
    container_name: acrophase_test_app
    depends_on:
      - test_db
    environment:
      DB_HOST: test_db
      DB_PORT: 5432
      DB_NAME: acrophase_test
      DB_USER: postgres
      DB_PASSWORD: admin
      PYTHONPATH: /app
    volumes:
      - .:/app
    command: >
      sh -c "sleep 5 &&
             pytest -v"

volumes:
  test_postgres_data:
