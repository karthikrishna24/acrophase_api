version: "3.8"

services:
  app:
    build: .
    container_name: acrophase_app
    env_file:
      - .env
    environment:
      DB_HOST: host.docker.internal
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: >
      sh -c "sleep 5 &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
